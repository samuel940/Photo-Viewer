<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" type="text/css">
    <title>Photo Viewer</title>
</head>
<body>
    <h1>
        <u>Photo Viewer</u>
    </h1>

    <div class="container">
        <img src="InitialImage.jpg" title="Current Image" alt="Current Image" id="currImage" onclick="nextPhoto()">
    </div>
    <div class="parameters">
        <p><strong>Status</strong><br>
        Photo being Displayed:
        <input type="text" id="currentPhoto" readonly></p>
            <div class="status" id="Status"> <p>Photo Viewer System</p></div>
    </div>
    <div class="parameters">
        <p>
            <strong>Loading Images (Local Folder)</strong><br>
            Photo's folder
            <input type="text" id="folder">
            Common Name
            <input type="text" id="name"><br>
            Start Photo Number
            <input type="number" id="startNumber" min="1">
            End Photo Number
            <input type="number" id="endNumber" min="1">
        </p>
        <button type="button" id="loadPhotos" onclick="loadPhotos()">Load Photos</button>
    </div>
    <div class="parameters">
        <p>
            <strong>Loading Images (JSON file)</strong><br>
            URL:
            <input type="text" id="url">
        </p>
        <button type="button" id="loadJSON" onclick="loadJSON()">Load JSON</button>
    </div>
    <div class="parameters">
        <p>
            <strong>Iterating</strong><br>
        </p>
        <button type="button" id="prevPhotos" onclick="prevPhoto()">Previous Photo</button>
        <button type="button" id="nextPhotos" onclick="nextPhoto()">Next Photo</button>
        <button type="button" id="firstPhotos" onclick="first()">First Photo</button>
        <button type="button" id="lastPhotos" onclick="last()">Last Photo</button>
    </div>
    <div class="parameters">
        <p>
            <strong>Slideshows</strong><br>
        </p>
        <button type="button" id="prevPhotos" onclick="startSlides()">Slideshow</button>
        <button type="button" id="nextPhotos" onclick="slidesRandom()">RandomSlideShow</button>
        <button type="button" id="firstPhotos" onclick="stop()">StopSlideShow</button>
    </div>

    <button type="button" id="Reset" onclick="reset()">Reset Form</button>

    <script src="code.js" defer></script>
</body>
</html>
